<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Mine-digger</title>
        <script src="http://cdn.bootcss.com/jquery/3.1.1/jquery.min.js"></script>
        <link rel="stylesheet" href="css/class_0.css">
    </head>
    <body>
        <div id="id-div-gameBody">
            <div id="id-div-showBar">
                <div class="item">
                    <span>所用时间(/s)</span>
                    <span id="id-span-time" class="spanItem">0</span>
                </div>
                <div class="item">
                    <img src="image/扫雷图.jpg" alt="">
                </div>
                <div class="item">
                    <span>标记</span>
                    <span id="id-showmark" class="spanItem">20</span>
                </div>
            </div>
            <div id="id-div-container">
                <!-- 容器 -->
            </div>
            <div id="id-div-bottomBar" class="buttons">
                <button>初级模式</button>
                <button>中级模式</button>
                <button>高级模式</button>
            </div>
        </div>
        <script src="js/main.js"></script>
    </body>
</html>
